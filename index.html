<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/ptx-favicon.svg" />
    <title>PTX Gateway - Portal to PTX Dataspace</title>
    <meta
      name="description"
      content="PTX Gateway helps organizations operationalize PTX contracts from configuration to secure execution and visualization."
    />
    <meta name="author" content="PTX Gateway" />

    <meta property="og:title" content="PTX Gateway to Dataspace" />
    <meta
      property="og:description"
      content="Operationalize PTX contracts through governed configuration, execution, and visualization."
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PTX Gateway to Dataspace" />

      name="twitter:description"
      content="Operationalize PTX contracts through governed configuration, execution, and visualization."
    />
    <meta name="twitter:image" content="/ptx-og-image.svg" />
    <script>
      try {
        if (window.location.pathname === "/embed") {
          document.documentElement.setAttribute("data-ptx-embed-pending", "true");
        }
      } catch (_) {}
    </script>
    <style>
      html[data-ptx-embed-pending="true"] body {
        background: transparent;
      }

      html[data-ptx-embed-pending="true"] #root {
        opacity: 0;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
