<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Admin dashboard overview">
  <rect width="1200" height="600" fill="#0f172a"/>
  <text x="60" y="90" fill="#e2e8f0" font-size="42" font-family="Arial, sans-serif" font-weight="700">PTX Gateway Admin Dashboard</text>
  <text x="60" y="130" fill="#94a3b8" font-size="24" font-family="Arial, sans-serif">Central place to configure PDC, resources, embed, and governance settings</text>
  <rect x="60" y="180" width="1080" height="360" rx="16" fill="#111827" stroke="#334155"/>
  <rect x="90" y="220" width="140" height="44" rx="8" fill="#1d4ed8"/>
  <text x="112" y="249" fill="#ffffff" font-size="18" font-family="Arial, sans-serif">PDC</text>
  <rect x="245" y="220" width="170" height="44" rx="8" fill="#1f2937" stroke="#334155"/>
  <text x="274" y="249" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">Resources</text>
  <rect x="430" y="220" width="180" height="44" rx="8" fill="#1f2937" stroke="#334155"/>
  <text x="462" y="249" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">Global</text>
  <rect x="625" y="220" width="170" height="44" rx="8" fill="#1f2937" stroke="#334155"/>
  <text x="650" y="249" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">Visualization</text>
  <rect x="810" y="220" width="140" height="44" rx="8" fill="#1f2937" stroke="#334155"/>
  <text x="847" y="249" fill="#cbd5e1" font-size="18" font-family="Arial, sans-serif">Embed</text>
  <text x="92" y="330" fill="#e2e8f0" font-size="22" font-family="Arial, sans-serif" font-weight="700">Use Export/Import at top-right for migration and backup</text>
  <text x="92" y="370" fill="#94a3b8" font-size="20" font-family="Arial, sans-serif">Most admin users manage: PDC + Resources + Embed</text>
  <text x="92" y="405" fill="#94a3b8" font-size="20" font-family="Arial, sans-serif">Super Admin also sees: Users + Organization</text>
</svg>
