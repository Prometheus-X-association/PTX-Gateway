<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Embed page">
  <rect width="1200" height="560" fill="#0f172a"/>
  <text x="60" y="84" fill="#e2e8f0" font-size="40" font-family="Arial, sans-serif" font-weight="700">Embed</text>
  <text x="60" y="120" fill="#94a3b8" font-size="23" font-family="Arial, sans-serif">Secure iframe/web-component integration with token and origin controls</text>
  <rect x="60" y="160" width="1080" height="340" rx="16" fill="#111827" stroke="#334155"/>
  <text x="90" y="220" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">1. Add Allowed Origins and enable embedding</text>
  <text x="90" y="260" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">2. Issue temporary/persistent token</text>
  <text x="90" y="300" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">3. Set Gateway Base URL and copy snippets</text>
  <text x="90" y="340" fill="#cbd5e1" font-size="22" font-family="Arial, sans-serif">4. Revoke persistent token when no longer needed</text>
</svg>
